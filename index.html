                const product = allProducts.find(p => p.id === id);

                setCart(prev => {
                    const currentQty = prev[id];
                    let newQty = currentQty + delta;
                    
                    if (product.minQty) {
                        if (delta > 0 && prev[id] === 0) newQty = minQty; 
                        else if (delta < 0 && prev[id] === minQty) newQty = 0;

                                            <p>統編：89187632</p>
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <h1 className="text-5xl font-extrabold text-slate-800 tracking-tight mb-2 print:text-black">報價單</h1>

                                            <p className="text-slate-500 text-sm font-medium">報價單號：<span className="text-slate-800">{`QT-${generateOrderId()}`}</span></p>
                                            <p className="text-slate-500 text-sm font-medium">開立日期：<span className="text-slate-800">{new Date().toLocaleDateString()}</span></p>
                                            <p className="text-slate-500 text-sm font-medium">幣別：<span className="text-slate-800 font-bold">{currency}</span></p>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-12 mb-10">

                                            </tr>
                                    </thead>

                                            {products.filter(p => cart[p.id] > 0).map((product, idx) => {
                                                const currentQty = cart[product.id];
                                                const unitPrice = getProductPrice(product, currentQty);
                                                return (
                                                    <tr key={product.id} className={`border-b border-slate-100 ${idx % 2 === 0 ? 'bg-white' : 'bg-slate-50/50'}`}>
                                                        <td className="py-4 px-4"><div><div className="font-bold text-slate-800 text-base print:text-black">{product.name}</div><div className="text-xs text-slate-500 mt-0.5">{product.desc}</div><div className="text-[10px] text-slate-400 mt-0.5">技術來源：{product.country}</div></div></td>

                                                            <div className="inline-flex items-center justify-center h-[40px] w-[100px] bg-white border border-slate-200 rounded-md print:border-slate-300">

                                                            </div>
                                                        </td>
                                                        <td className="py-4 px-4 text-center text-slate-600 font-medium">{formatPrice(unitPrice)}</td>
                                                        <td className="py-4 px-4 text-center font-bold text-slate-800">{currentQty}</td>
                                                        <td className="py-4 px-4 text-right font-bold text-slate-800">{formatPrice(unitPrice * currentQty)}</td>
                                                    </tr>
                                                );
                                            })}
                                    </tbody>
                                </table>

                                <div className="flex justify-end mb-12">
                                    <div className="w-96 space-y-3">
                                            <div className="flex justify-between text-slate-600 text-sm font-medium px-2">
                                                <span>小計 Subtotal</span>
                                                <span>{formatPrice(totals.subtotal)}</span>
                                            </div>
                                            {totals.discount > 0 && (
                                                <div className="flex justify-between text-green-700 text-sm font-bold bg-green-50 py-2 px-3 rounded border border-green-100 print:text-black print:bg-slate-100 print:border-slate-200">
                                                    <span className="flex items-center gap-1"><Check size={14}/> 折扣 (Discount)</span>
                                                    <span>-{formatPrice(totals.discount)}</span>
                                                </div>
                                            )}

                                                <span className="text-xl font-bold text-slate-800 print:text-black">總計 Total:</span>
                                                <span className="text-4xl font-extrabold text-slate-900 print:text-black tracking-tight">{formatPrice(totals.total)}</span>
                                            </div>
                                            <div className="text-right text-xs font-medium text-slate-400 uppercase tracking-wider px-2">(含稅金額)</div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-12 border-t border-slate-200 pt-8 print:break-inside-avoid">
                                    <div>
                                            <h4 className="font-bold text-sm text-slate-800 mb-3 uppercase tracking-wider">備註事項 (Notes)</h4>
                                            <ul className="text-xs text-slate-600 space-y-2 list-disc list-inside bg-slate-50 p-4 rounded-lg border border-slate-100 print:bg-white print:border-slate-200">
                                                {formData.note && <li className="font-medium text-slate-800">客戶備註：{formData.note}</li>}
                                                {totals.appliedRule && <li className="text-green-700 font-bold print:text-black">{totals.appliedRule}</li>}
                                                {referralCode && !totals.appliedRule && <li className="text-slate-800 font-medium">指定推薦代碼：{referralCode}</li>}
                                                <li className="text-red-600 font-bold text-sm mt-2 print:text-black">匯款請在備註欄上填寫貴校大名以利對帳 謝謝</li>
                                                {currency === 'TWD' ? (
                                                    <>
                                                        <li className="mt-1 pt-1 border-t border-slate-200 text-slate-600 font-bold print:text-black">經典人文教育股份有限公司</li>
                                                        <li className="text-slate-600">013 國泰銀行 市政分行</li>
                                                        <li className="text-slate-600">帳號：234035015109</li>
                                                        <li className="print:hidden"><a href="https://drive.google.com/file/d/1KzCNoW6X4UT_0o-fjniSq4p3KjPiWpYJ/view?usp=sharing" target="_blank" rel="noopener noreferrer" className="text-blue-600 underline hover:text-blue-800 flex items-center gap-1"><ExternalLink size={12} /> Edcafe AI 台幣銀行存摺</a></li>
                                                    </>
                                                ) : (
                                                    <>
                                                        <li className="mt-1 pt-1 border-t border-slate-200 text-slate-800 font-bold print:text-black">Airwallex 全球收款账户信息</li>
                                                        <li className="text-slate-600 text-[10px]">帳戶名稱: JING DIAN REN WEN JIAO YU GU FEN YOU XIAN GONG SI</li>
                                                        <li className="text-slate-600">收款帳號: 7950144805</li>
                                                        <li className="text-slate-600">銀行名稱: DBS Bank (Hong Kong) Limited (016)</li>
                                                        <li className="text-slate-600">分行代碼: 478 | SWIFT: DHBKHKHH</li>
                                                        <li className="text-slate-600">地區: 香港特別行政區</li>
                                                    </>
                                                )}
                                            </ul>
                                    </div>
                                    <div>
                                            <h4 className="font-bold text-sm text-slate-800 mb-3 uppercase tracking-wider">簽署確認 (Signature)</h4>
                                            <div className="h-32 border-2 border-dashed border-slate-300 rounded-lg bg-slate-50/50 mt-2 relative flex items-end justify-center pb-4 print:bg-white print:border-slate-400">
                                                <span className="text-xs text-slate-400 font-medium uppercase tracking-wider print:text-slate-600">請在此處用印或簽名回傳</span>
                                            </div>
                                            <p className="text-[10px] text-slate-400 mt-3 text-center">簽署後請回傳至 sales@futureknowledge.ai 以完成訂單程序。<br/>本報價單內容具商業機密，請勿外流。</p>
                                    </div>
                                </div>
                            </div>
                            <div className="mt-8 border-t border-slate-200 pt-4 flex items-center justify-center text-slate-400 gap-8 print:flex hidden">
                                <div className="flex items-center gap-2"><div className="w-6 h-6 rounded-full bg-slate-200 text-slate-600 flex items-center justify-center text-xs font-bold print:bg-slate-800 print:text-white">1</div><span className="text-xs">產出報價單</span></div>
                                <ArrowRightCircle size={14} />
                                <div className="flex items-center gap-2"><div className="w-6 h-6 rounded-full bg-slate-800 text-white flex items-center justify-center text-xs font-bold print:bg-slate-200 print:text-slate-800">2</div><span className="text-xs font-bold text-slate-800">用印回傳真人客服</span></div>
                                <ArrowRightCircle size={14} />
                                <div className="flex items-center gap-2"><div className="w-6 h-6 rounded-full bg-slate-200 text-slate-600 flex items-center justify-center text-xs font-bold print:bg-slate-800 print:text-white">3</div><span className="text-xs">真人客服授權開通</span></div>
                            </div>
                            <div className="absolute bottom-0 left-0 right-0 h-3 bg-gradient-to-r from-blue-600 via-purple-600 to-pink-600 print:block"></div>
                        </div>
                    </div>
                );
            }

            return null;
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<QuotationSystem />);
    </script>
</body>
